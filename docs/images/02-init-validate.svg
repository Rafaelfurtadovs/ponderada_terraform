<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" rx="12" fill="#111827"/>
  <rect x="0" y="0" width="1180" height="44" rx="12" fill="#1f2937"/>
  <circle cx="24" cy="22" r="7" fill="#ef4444"/>
  <circle cx="48" cy="22" r="7" fill="#f59e0b"/>
  <circle cx="72" cy="22" r="7" fill="#22c55e"/>
  <text x="96" y="28" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="15">terraform init e validate</text>
  <text x="28" y="82" fill="#34d399" font-family="Menlo, Consolas, monospace" font-size="18">$ terraform init</text>
  <text x="28" y="124" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">Initializing provider plugins found in the configuration...</text>
  <text x="28" y="164" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">- Finding hashicorp/aws versions matching "~&gt; 5.92"...</text>
  <text x="28" y="204" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">- Installing hashicorp/aws v5.100.0...</text>
  <text x="28" y="244" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">- Installed hashicorp/aws v5.100.0 (signed by HashiCorp)</text>
  <text x="28" y="296" fill="#22c55e" font-family="Menlo, Consolas, monospace" font-size="18">Terraform has been successfully initialized!</text>
  <text x="28" y="356" fill="#34d399" font-family="Menlo, Consolas, monospace" font-size="18">$ terraform validate</text>
  <text x="28" y="398" fill="#22c55e" font-family="Menlo, Consolas, monospace" font-size="18">Success! The configuration is valid.</text>
  <text x="28" y="458" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">Resultado: provider instalado e sintaxe validada com sucesso.</text>
</svg>
